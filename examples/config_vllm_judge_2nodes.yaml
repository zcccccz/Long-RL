data:
  train_files: LongVideo-Reason/longvideo-reason@train
  val_files: LongVideo-Reason/longvideo-reason@validation
  prompt_key: problem
  answer_key: answer
  image_key: images
  image_dir: null
  video_dir: null
  max_prompt_length: 2048
  max_response_length: 2048
  rollout_batch_size: 512
  mini_rollout_batch_size: null
  val_batch_size: 1024
  format_prompt: ./examples/format_prompt/r1v.jinja
  override_chat_template: null
  shuffle: true
  seed: 1
  min_pixels: 262144
  max_pixels: 4194304
  filter_overlong_prompts: true

algorithm:
  adv_estimator: grpo
  disable_kl: false
  use_kl_loss: true
  kl_penalty: low_var_kl
  kl_coef: 1.0e-2
  online_filtering: false
  filter_key: overall
  filter_low: 0.01
  filter_high: 0.99

worker:
  actor:
    global_batch_size: 128
    micro_batch_size_per_device_for_update: 4
    micro_batch_size_per_device_for_experience: 16
    max_grad_norm: 1.0
    padding_free: true
    ulysses_size: 1
    model:
      model_path: Qwen/Qwen2.5-VL-3B-Instruct
      enable_gradient_checkpointing: true
      trust_remote_code: false
      freeze_vision_tower: false
    optim:
      lr: 1.0e-6
      weight_decay: 1.0e-2
      strategy: adamw
      lr_warmup_ratio: 0.0
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: false
      enable_rank0_init: true
    offload:
      offload_params: true
      offload_optimizer: true

  rollout:
    n: 5
    temperature: 1.0
    top_p: 0.99
    gpu_memory_utilization: 0.6
    enforce_eager: false
    enable_chunked_prefill: false
    tensor_parallel_size: 2
    limit_images: 0
    num_video_frames: 32
    max_num_batched_tokens: 10240
    val_override_config:
      temperature: 0.5
      n: 1

  ref:
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: true
      enable_rank0_init: true
    offload:
      offload_params: false

  reward:
    reward_type: vllm_judge  # 使用vLLM高性能判断模块
    num_cpus: 1
    # Judge model configuration - 使用1个GPU部署answer judge LLM
    judge_model_path: Qwen/Qwen2.5-7B-Instruct  # 判断模型路径
    judge_gpu_count: 1  # 判断模型使用1个GPU
    judge_gpu_memory_utilization: 0.8  # 判断模型GPU内存利用率
    judge_max_model_len: 4096  # 判断模型最大长度
    # Binary judgment template
    judge_template: |
      You are an expert AI evaluator. Your task is to determine if a response correctly answers the given question.

      Question: {question}
      Ground Truth Answer: {ground_truth}
      Model Response: {response}

      Evaluation criteria:
      1. Factual accuracy: Does the response provide correct information?
      2. Completeness: Does it address all parts of the question?
      3. Consistency: Is it consistent with the ground truth?

      Important: You must respond with EXACTLY one of these two formats:
      - "Correct: Yes" if the response is correct and complete
      - "Correct: No" if the response is incorrect, incomplete, or inconsistent

      Your judgment:

trainer:
  total_epochs: 15
  max_steps: null
  project_name: easy_r1
  experiment_name: qwen2_5_vl_3b_video_vllm_judge_2nodes
  logger: ["console", "wandb"]
  nnodes: 2  # 使用2个节点
  n_gpus_per_node: 8  # 每个节点8个GPU，总共16个GPU
  # 系统会自动分配：1个GPU给judge，剩余15个GPU给RL workers，分布为[8,7]
  max_try_make_batch: 20
  val_freq: 5
  val_before_train: true
  val_only: false
  val_generations_to_log: 3
  save_freq: 5
  save_limit: 3
  save_model_only: false
  save_checkpoint_path: null
  load_checkpoint_path: null